spring:
  application:
    name: processing

  # ── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── MongoDB ───────────────────────────────────────────────
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/processing}

# ── Custom App Properties ────────────────────────────────
app:
  rabbitmq:
    exchange: petitions-exchange
    queue: petitions-queue
    routing-key: petition.created
