spring:
  application:
    name: petitions

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petitions?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    mapper:
      accept-case-insensitive-enums: true

app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:petitions-exchange}
    queue: ${RABBITMQ_QUEUE:petitions-queue}
    routing-key:
      created: ${RABBITMQ_ROUTING_KEY:petition.created}

  security:
    api-key: ${API_KEY:t3sT-k3y-123!}
